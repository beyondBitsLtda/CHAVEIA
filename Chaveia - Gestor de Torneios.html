document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

         <button onclick=\"{{ onCloseModal }}\" style=\"flex:1;padding:12px;border-radius:11px;background:#141c26;border:1px solid #26313f;color:#cdd6df;font-size:14px;font-weight:600;cursor:pointer;\">Cancelar<\u002Fbutton>\n          <button onclick=\"{{ onSaveModal }}\" style=\"flex:1.4;padding:12px;border-radius:11px;background:{{ accent }};border:none;color:#04140b;font-size:14px;font-weight:700;cursor:pointer;font-family:'Space Grotesk';\" style-hover=\"filter:brightness(1.08);\">Salvar resultado<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#22e07a&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Aparência&quot;},&quot;doubleRoundRobin&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Regras&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.fileRef = React.createRef();\n    this.state = this.buildMockState();\n  }\n\n  // ---------- accent ----------\n  get accent() { return this.props.accentColor || '#22e07a'; }\n\n  // ---------- setup / mock ----------\n  freshConfig() {\n    return { pointsWin: 3, pointsDraw: 1, groupSize: 4, qualifyPerGroup: 2, tiebreakers: ['sg', 'v', 'gp', 'h2h'] };\n  }\n  freshWizard(format) {\n    return {\n      step: 1,\n      format: format || 'knockout',\n      count: 8,\n      teams: Array.from({ length: 8 }, () => ({ name: '' })),\n      config: this.freshConfig(),\n    };\n  }\n  buildMockState() {\n    const names = ['Palmeiras', 'Flamengo', 'Grêmio', 'Corinthians', 'Atlético-MG', 'Fluminense', 'Internacional', 'São Paulo'];\n    const teams = names.map((n, i) => ({ id: 't' + (i + 1), name: n }));\n    const st = {\n      screen: 'tournament',\n      format: 'knockout',\n      config: this.freshConfig(),\n      teams,\n      knockout: { matches: [], rounds: 0 },\n      league: { matches: [] },\n      groups: [],\n      groupsKnockout: null,\n      modal: { open: false, matchId: null, phase: null, draft: { home: '', away: '', status: 'finished' } },\n      wizard: this.freshWizard(),\n    };\n    st.knockout = this.genKnockout(teams);\n    // demo results\n    const ko = st.knockout;\n    const set = (id, h, a) => { const m = ko.matches.find(x => x.id === id); if (m) { m.homeScore = h; m.awayScore = a; m.status = 'finished'; } };\n    set('k-0-0', 2, 1); set('k-0-1', 0, 3); set('k-0-2', 3, 1); set('k-0-3', 1, 2);\n    this.recomputeKnockout(ko);\n    set('k-1-0', 1, 0);\n    this.recomputeKnockout(ko);\n    return st;\n  }\n\n  // ---------- generation ----------\n  genKnockout(teams) {\n    const N = teams.length;\n    const rounds = Math.max(1, Math.ceil(Math.log2(Math.max(2, N))));\n    const size = Math.pow(2, rounds);\n    const slots = [];\n    for (let i = 0; i < size; i++) slots.push(teams[i] ? teams[i].id : null);\n    const matches = [];\n    const r0 = size / 2;\n    for (let i = 0; i < r0; i++) {\n      matches.push({ id: 'k-0-' + i, round: 0, slot: i, homeId: slots[i * 2], awayId: slots[i * 2 + 1], homeScore: null, awayScore: null, status: 'scheduled' });\n    }\n    let prev = r0;\n    for (let r = 1; r < rounds; r++) {\n      const cnt = prev / 2;\n      for (let i = 0; i < cnt; i++) matches.push({ id: 'k-' + r + '-' + i, round: r, slot: i, homeId: null, awayId: null, homeScore: null, awayScore: null, status: 'scheduled' });\n      prev = cnt;\n    }\n    const ko = { matches, rounds };\n    this.recomputeKnockout(ko);\n    return ko;\n  }\n  roundRobin(ids) {\n    let arr = ids.slice();\n    if (arr.length % 2) arr.push(null);\n    const n = arr.length, rounds = n - 1, half = n / 2, res = [];\n    for (let r = 0; r < rounds; r++) {\n      for (let i = 0; i < half; i++) {\n        const a = arr[i], b = arr[n - 1 - i];\n        if (a != null && b != null) { const p = r % 2 ? [b, a] : [a, b]; p.round = r + 1; res.push(p); }\n      }\n      arr = [arr[0], ...arr.slice(2), arr[1]];\n    }\n    return res;\n  }\n  genLeague(teams) {\n    const ids = teams.map(t => t.id);\n    let pairs = this.roundRobin(ids);\n    if (this.props.doubleRoundRobin) {\n      const total = pairs.reduce((m, p) => Math.max(m, p.round), 0);\n      const mirror = pairs.map(p => { const q = [p[1], p[0]]; q.round = p.round + total; return q; });\n      pairs = pairs.concat(mirror);\n    }\n    return { matches: pairs.map((p, i) => ({ id: 'l-' + i, homeId: p[0], awayId: p[1], homeScore: null, awayScore: null, status: 'scheduled', round: p.round })) };\n  }\n  genGroups(teams, size) {\n    const groups = [];\n    for (let i = 0; i < teams.length; i += size) {\n      const chunk = teams.slice(i, i + size);\n      const ids = chunk.map(t => t.id);\n      const gi = groups.length;\n      groups.push({\n        id: 'g' + gi,\n        name: 'Grupo ' + String.fromCharCode(65 + gi),\n        teamIds: ids,\n        matches: this.roundRobin(ids).map((p, k) => ({ id: 'g' + gi + '-' + k, homeId: p[0], awayId: p[1], homeScore: null, awayScore: null, status: 'scheduled', round: p.round })),\n      });\n    }\n    return groups;\n  }\n\n  // ---------- knockout logic ----------\n  winnerId(m) {\n    if (m.homeId && !m.awayId) return m.homeId;\n    if (!m.homeId && m.awayId) return m.awayId;\n    if (m.homeScore != null && m.awayScore != null && m.status === 'finished') {\n      if (m.homeScore > m.awayScore) return m.homeId;\n      if (m.awayScore > m.homeScore) return m.awayId;\n      if (m.penHome != null && m.penAway != null) {\n        if (m.penHome > m.penAway) return m.homeId;\n        if (m.penAway > m.penHome) return m.awayId;\n      }\n    }\n    return null;\n  }\n  recomputeKnockout(ko) {\n    if (!ko || !ko.matches) return;\n    ko.matches.forEach(m => { if (m.round > 0) { m.homeId = null; m.awayId = null; } });\n    const byId = {};\n    ko.matches.forEach(m => { byId[m.id] = m; });\n    for (let r = 0; r < ko.rounds - 1; r++) {\n      ko.matches.filter(m => m.round === r).forEach(m => {\n        const w = this.winnerId(m);\n        const nx = byId['k-' + (r + 1) + '-' + Math.floor(m.slot / 2)];\n        if (!nx) return;\n        if (m.slot % 2 === 0) nx.homeId = w; else nx.awayId = w;\n      });\n    }\n  }\n\n  // ---------- standings ----------\n  computeStandings(teamIds, matches) {\n    const cfg = this.state.config;\n    const t = {};\n    teamIds.forEach(id => { t[id] = { id, pj: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, pts: 0 }; });\n    matches.forEach(m => {\n      if (m.status !== 'finished' || m.homeScore == null || m.awayScore == null) return;\n      const h = t[m.homeId], a = t[m.awayId]; if (!h || !a) return;\n      h.pj++; a.pj++; h.gp += m.homeScore; h.gc += m.awayScore; a.gp += m.awayScore; a.gc += m.homeScore;\n      if (m.homeScore > m.awayScore) { h.v++; a.d++; h.pts += cfg.pointsWin; }\n      else if (m.homeScore < m.awayScore) { a.v++; h.d++; a.pts += cfg.pointsWin; }\n      else { h.e++; a.e++; h.pts += cfg.pointsDraw; a.pts += cfg.pointsDraw; }\n    });\n    const rows = Object.values(t);\n    rows.forEach(r => { r.sg = r.gp - r.gc; });\n    rows.sort((x, y) => this.compareRows(x, y, matches));\n    return rows;\n  }\n  compareRows(x, y, matches) {\n    if (y.pts !== x.pts) return y.pts - x.pts;\n    for (const tb of this.state.config.tiebreakers) {\n      if (tb === 'sg' && y.sg !== x.sg) return y.sg - x.sg;\n      if (tb === 'v' && y.v !== x.v) return y.v - x.v;\n      if (tb === 'gp' && y.gp !== x.gp) return y.gp - x.gp;\n      if (tb === 'h2h') { const d = this.headToHead(x.id, y.id, matches); if (d !== 0) return d; }\n    }\n    return 0;\n  }\n  headToHead(aId, bId, matches) {\n    let ap = 0, bp = 0;\n    matches.forEach(m => {\n      if (m.status !== 'finished' || m.homeScore == null) return;\n      if (m.homeId === aId && m.awayId === bId) { if (m.homeScore > m.awayScore) ap += 3; else if (m.homeScore < m.awayScore) bp += 3; else { ap++; bp++; } }\n      else if (m.homeId === bId && m.awayId === aId) { if (m.homeScore > m.awayScore) bp += 3; else if (m.homeScore < m.awayScore) ap += 3; else { ap++; bp++; } }\n    });\n    return bp - ap;\n  }\n\n  // ---------- modal ----------\n  findMatch(id) {\n    const pools = [this.state.knockout && this.state.knockout.matches, this.state.league && this.state.league.matches, this.state.groupsKnockout && this.state.groupsKnockout.matches];\n    for (const p of pools) { if (p) { const f = p.find(x => x.id === id); if (f) return f; } }\n    for (const g of this.state.groups) { const f = g.matches.find(x => x.id === id); if (f) return f; }\n    return null;\n  }\n  openModal(id, phase) {\n    const m = this.findMatch(id);\n    if (!m || !m.homeId || !m.awayId) return;\n    this.setState({ modal: { open: true, matchId: id, phase, draft: { home: m.homeScore == null ? '' : String(m.homeScore), away: m.awayScore == null ? '' : String(m.awayScore), status: m.status || 'finished', penHome: m.penHome == null ? '' : String(m.penHome), penAway: m.penAway == null ? '' : String(m.penAway) } } });\n  }\n  closeModal() { this.setState(s => ({ modal: { ...s.modal, open: false } })); }\n  setDraft(patch) { this.setState(s => ({ modal: { ...s.modal, draft: { ...s.modal.draft, ...patch } } })); }\n  saveModal() {\n    const { matchId, phase, draft } = this.state.modal;\n    const m = this.findMatch(matchId);\n    if (!m) { this.closeModal(); return; }\n    const hs = draft.home === '' ? null : parseInt(draft.home, 10);\n    const as = draft.away === '' ? null : parseInt(draft.away, 10);\n    m.homeScore = (hs == null || isNaN(hs)) ? null : hs;\n    m.awayScore = (as == null || isNaN(as)) ? null : as;\n    m.status = draft.status;\n    const isKo = phase === 'knockout' || phase === 'groupsko';\n    if (isKo && m.homeScore != null && m.awayScore != null && m.homeScore === m.awayScore) {\n      const ph = (draft.penHome === '' || draft.penHome == null) ? null : parseInt(draft.penHome, 10);\n      const pa = (draft.penAway === '' || draft.penAway == null) ? null : parseInt(draft.penAway, 10);\n      m.penHome = (ph == null || isNaN(ph)) ? null : ph;\n      m.penAway = (pa == null || isNaN(pa)) ? null : pa;\n    } else { m.penHome = null; m.penAway = null; }\n    if (phase === 'knockout') this.recomputeKnockout(this.state.knockout);\n    if (phase === 'groupsko') this.recomputeKnockout(this.state.groupsKnockout);\n    this.setState({ modal: { open: false, matchId: null, phase: null, draft: { home: '', away: '', status: 'finished' } } });\n  }\n\n  // ---------- import / export ----------\n  exportJSON() {\n    const s = this.state;\n    const data = { app: 'chaveia', version: 1, format: s.format, config: s.config, teams: s.teams, knockout: s.knockout, league: s.league, groups: s.groups, groupsKnockout: s.groupsKnockout };\n    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'torneio-' + s.format + '.json'; a.click();\n    setTimeout(() => URL.revokeObjectURL(url), 500);\n  }\n  onImport() { if (this.fileRef.current) this.fileRef.current.click(); }\n  onFileChange(e) {\n    const f = e.target.files && e.target.files[0];\n    if (!f) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      try {\n        const d = JSON.parse(reader.result);\n        if (!d.teams || !d.format) throw new Error('estrutura inválida');\n        this.setState({\n          screen: 'tournament', format: d.format, config: d.config || this.freshConfig(), teams: d.teams,\n          knockout: d.knockout || { matches: [], rounds: 0 }, league: d.league || { matches: [] },\n          groups: d.groups || [], groupsKnockout: d.groupsKnockout || null,\n          modal: { open: false, matchId: null, phase: null, draft: { home: '', away: '', status: 'finished' } },\n        });\n      } catch (err) { alert('Não foi possível importar: ' + err.message); }\n    };\n    reader.readAsText(f);\n    e.target.value = '';\n  }\n\n  // ---------- wizard ----------\n  onNew() { this.setState({ screen: 'setup', wizard: this.freshWizard(this.state.format) }); }\n  setWiz(patch) { this.setState(s => ({ wizard: { ...s.wizard, ...patch } })); }\n  setWizConfig(patch) { this.setState(s => ({ wizard: { ...s.wizard, config: { ...s.wizard.config, ...patch } } })); }\n  setWizCount(n) {\n    n = Math.max(2, Math.min(32, n | 0));\n    this.setState(s => {\n      const teams = s.wizard.teams.slice(0, n);\n      while (teams.length < n) teams.push({ name: '' });\n      return { wizard: { ...s.wizard, count: n, teams } };\n    });\n  }\n  setTeamName(i, val) {\n    this.setState(s => { const teams = s.wizard.teams.slice(); teams[i] = { name: val }; return { wizard: { ...s.wizard, teams } }; });\n  }\n  moveTiebreak(i, dir) {\n    this.setState(s => {\n      const tb = s.wizard.config.tiebreakers.slice();\n      const j = i + dir; if (j < 0 || j >= tb.length) return {};\n      [tb[i], tb[j]] = [tb[j], tb[i]];\n      return { wizard: { ...s.wizard, config: { ...s.wizard.config, tiebreakers: tb } } };\n    });\n  }\n  wizNext() {\n    const w = this.state.wizard;\n    if (w.step < 4) { this.setWiz({ step: w.step + 1 }); return; }\n    this.generate();\n  }\n  wizBack() {\n    const w = this.state.wizard;\n    if (w.step > 1) this.setWiz({ step: w.step - 1 });\n    else this.setState({ screen: 'tournament' });\n  }\n  generate() {\n    const w = this.state.wizard;\n    const teams = w.teams.slice(0, w.count).map((t, i) => ({ id: 't' + (i + 1), name: (t.name || '').trim() || ('Time ' + (i + 1)) }));\n    const base = { screen: 'tournament', format: w.format, config: w.config, teams, knockout: { matches: [], rounds: 0 }, league: { matches: [] }, groups: [], groupsKnockout: null, modal: { open: false, matchId: null, phase: null, draft: { home: '', away: '', status: 'finished' } } };\n    if (w.format === 'knockout') base.knockout = this.genKnockout(teams);\n    else if (w.format === 'league') base.league = this.genLeague(teams);\n    else if (w.format === 'groups') base.groups = this.genGroups(teams, w.config.groupSize);\n    this.setState(base);\n  }\n\n  // ---------- groups -> knockout ----------\n  generateGroupsKnockout() {\n    const q = this.state.config.qualifyPerGroup;\n    const qualifiers = [];\n    this.state.groups.forEach(g => {\n      const rows = this.computeStandings(g.teamIds, g.matches);\n      for (let i = 0; i < q && i < rows.length; i++) qualifiers.push({ id: rows[i].id, name: this.teamName(rows[i].id) });\n    });\n    if (qualifiers.length < 2) { alert('Poucos classificados para gerar o mata-mata.'); return; }\n    this.setState({ groupsKnockout: this.genKnockout(qualifiers) });\n  }\n\n  // ---------- helpers ----------\n  teamName(id) { return this._tmap ? (this._tmap[id] || '') : ''; }\n\n  // ---------- style builders ----------\n  koRowStyle(win, finished) {\n    const base = 'display:flex;align-items:center;justify-content:space-between;padding:9px 13px;font-family:Space Grotesk;font-weight:500;font-size:14px;';\n    if (!finished) return base + 'border-left:3px solid transparent;color:#dbe2ea;';\n    return win\n      ? base + 'border-left:3px solid ' + this.accent + ';background:linear-gradient(90deg,rgba(34,224,122,.13),transparent);color:#eafff2;'\n      : base + 'border-left:3px solid transparent;opacity:.5;color:#9aa6b2;';\n  }\n  dotStyle(status) {\n    const c = status === 'finished' ? this.accent : status === 'live' ? '#f5a524' : '#5b6672';\n    return 'width:6px;height:6px;border-radius:50%;background:' + c + (status === 'live' ? ';animation:pulseDot 1.2s infinite;' : ';');\n  }\n  standRowStyle(qualified, cols) {\n    const base = 'display:grid;grid-template-columns:' + cols + ';gap:0;align-items:center;padding:9px 4px;border-bottom:1px solid #131a23;font-size:13.5px;';\n    return qualified ? base + 'background:linear-gradient(90deg,rgba(34,224,122,.06),transparent);' : base;\n  }\n  posStyle(qualified) {\n    const base = 'font-family:JetBrains Mono,monospace;font-weight:700;font-size:12px;text-align:center;';\n    return qualified ? base + 'color:' + this.accent + ';' : base + 'color:#6b7887;';\n  }\n  scoreStyle(finished) {\n    const base = 'min-width:52px;text-align:center;font-family:JetBrains Mono,monospace;font-weight:700;font-size:14px;padding:3px 8px;border-radius:7px;';\n    return finished ? base + 'background:#182029;color:#fff;border:1px solid #2a3644;' : base + 'background:transparent;color:#6b7887;border:1px solid #1c2530;';\n  }\n  matchView(m, phase) {\n    const nm = id => id ? (this.teamName(id) || '—') : (m.round === 0 && phase.indexOf('ko') < 0 && phase !== 'knockout' ? '—' : 'A definir');\n    const w = this.winnerId(m);\n    const fin = m.status === 'finished';\n    const pens = (m.penHome != null && m.penAway != null) ? (m.penHome + '-' + m.penAway) : null;\n    const baseStatus = { scheduled: 'Não iniciada', live: 'Em andamento', finished: 'Finalizada' }[m.status];\n    return {\n      id: m.id,\n      home: m.homeId ? (this.teamName(m.homeId) || '—') : (m.round === 0 ? 'BYE' : 'A definir'),\n      away: m.awayId ? (this.teamName(m.awayId) || '—') : (m.round === 0 ? 'BYE' : 'A definir'),\n      homeScore: m.homeScore == null ? '·' : (String(m.homeScore) + (pens && m.penHome > m.penAway ? '·' : '')),\n      awayScore: m.awayScore == null ? '·' : (String(m.awayScore) + (pens && m.penAway > m.penHome ? '·' : '')),\n      scoreLabel: (m.homeScore == null || m.awayScore == null) ? 'vs' : (m.homeScore + ' - ' + m.awayScore),\n      scoreStyle: this.scoreStyle(fin),\n      statusLabel: baseStatus + (pens ? ' · pên ' + pens : ''),\n      dotStyle: this.dotStyle(m.status),\n      homeStyle: this.koRowStyle(fin && w === m.homeId, fin),\n      awayStyle: this.koRowStyle(fin && w === m.awayId, fin),\n      onOpen: (m.homeId && m.awayId) ? () => this.openModal(m.id, phase) : () => {},\n    };\n  }\n\n  // ---------- render ----------\n  renderVals() {\n    const s = this.state;\n    this._tmap = {}; (s.teams || []).forEach(t => { this._tmap[t.id] = t.name; });\n    const accent = this.accent;\n    const isSetup = s.screen === 'setup';\n    const isTournament = s.screen === 'tournament';\n    const formatLabels = { knockout: 'Mata-mata', league: 'Pontos corridos', groups: 'Grupos + Mata-mata' };\n\n    const out = {\n      accent,\n      isSetup, isTournament,\n      isKnockout: isTournament && s.format === 'knockout',\n      isLeague: isTournament && s.format === 'league',\n      isGroups: isTournament && s.format === 'groups',\n      formatLabel: formatLabels[s.format] || '',\n      teamCount: (s.teams || []).length,\n      fileRef: this.fileRef,\n      onImport: () => this.onImport(),\n      onExport: () => this.exportJSON(),\n      onFileChange: e => this.onFileChange(e),\n      onNew: () => this.onNew(),\n      stopProp: e => e.stopPropagation(),\n    };\n\n    // ----- bracket (active) -----\n    const activeKo = s.format === 'groups' ? s.groupsKnockout : s.knockout;\n    const koPhase = s.format === 'groups' ? 'groupsko' : 'knockout';\n    let bracketRounds = [];\n    let bh = 380;\n    if (activeKo && activeKo.rounds) {\n      const R = activeKo.rounds;\n      const roundName = r => {\n        const fe = R - 1 - r;\n        return ['Final', 'Semifinal', 'Quartas de Final', 'Oitavas de Final', '16-avos'][fe] || ('Rodada ' + (r + 1));\n      };\n      for (let r = 0; r < R; r++) {\n        const ms = activeKo.matches.filter(m => m.round === r).sort((a, b) => a.slot - b.slot).map(m => this.matchView(m, koPhase));\n        bracketRounds.push({ name: roundName(r), matches: ms, key: 'r' + r });\n      }\n      const r0 = activeKo.matches.filter(m => m.round === 0).length;\n      bh = Math.max(360, r0 * 120);\n    }\n    out.bracketRounds = bracketRounds;\n    out.bracketHeightPx = bh + 'px';\n    out.groupsHasKnockout = !!(s.groupsKnockout && s.groupsKnockout.rounds);\n\n    // ----- league -----\n    if (out.isLeague) {\n      const rows = this.computeStandings(s.teams.map(t => t.id), s.league.matches);\n      out.standings = rows.map((r, i) => {\n        const q = i < 4;\n        return { pos: i + 1, name: this.teamName(r.id), pj: r.pj, v: r.v, e: r.e, d: r.d, gp: r.gp, gc: r.gc, sg: (r.sg > 0 ? '+' : '') + r.sg, pts: r.pts, rowStyle: this.standRowStyle(q, '30px 1fr 34px 30px 30px 30px 40px 40px 42px 44px'), posStyle: this.posStyle(q) };\n      });\n      const byRound = {};\n      s.league.matches.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });\n      out.leagueRounds = Object.keys(byRound).map(k => ({ label: 'Rodada ' + k, matches: byRound[k].map(m => this.matchView(m, 'league')) }));\n    } else { out.standings = []; out.leagueRounds = []; }\n\n    // ----- groups -----\n    if (out.isGroups) {\n      const q = s.config.qualifyPerGroup;\n      out.groups = s.groups.map(g => {\n        const rows = this.computeStandings(g.teamIds, g.matches);\n        return {\n          name: g.name,\n          standings: rows.map((r, i) => ({ pos: i + 1, name: this.teamName(r.id), pj: r.pj, sg: (r.sg > 0 ? '+' : '') + r.sg, pts: r.pts, rowStyle: this.standRowStyle(i < q, '26px 1fr 30px 40px 44px'), posStyle: this.posStyle(i < q) })),\n          matches: g.matches.map(m => this.matchView(m, 'group')),\n        };\n      });\n      out.qualifyLabel = q === 1 ? '1' : q + '';\n      out.onGenKnockout = () => this.generateGroupsKnockout();\n      out.genKoLabel = out.groupsHasKnockout ? 'Regenerar mata-mata' : 'Gerar mata-mata';\n      out.genKoStyle = 'padding:10px 16px;border-radius:10px;background:' + accent + ';border:none;color:#04140b;font-size:13px;font-weight:700;cursor:pointer;font-family:Space Grotesk;';\n    } else { out.groups = []; out.qualifyLabel
